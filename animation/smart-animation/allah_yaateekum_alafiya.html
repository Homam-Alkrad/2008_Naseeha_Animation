<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الله يعطيكم العافية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fffdf6;
      font-family: 'Cairo', sans-serif;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,220,100,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(255,180,80,0.10) 0%, transparent 55%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
    }

    .card {
      position: relative;
      width: 90%;
      padding: clamp(10px, 3vh, 28px) clamp(12px, 4vw, 36px);
      background: rgba(255, 253, 246, 0.97);
      border: 1px solid rgba(212, 146, 10, 0.25);
      border-radius: 20px;
      text-align: center;
      overflow: hidden;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.9) inset,
        0 6px 24px rgba(100,60,0,0.10);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.93); }
      to   { opacity: 1; transform: scale(1); }
    }

    .ornament-line {
      display: block;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,146,10,0.45), transparent);
      margin: 0 auto clamp(6px, 1.5vh, 14px);
    }
    .ornament-line.bottom { margin: clamp(6px, 1.5vh, 14px) auto 0; }

    .gem-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: clamp(5px, 1.2vh, 12px);
    }
    .gem {
      width: 5px; height: 5px;
      background: #d4920a;
      transform: rotate(45deg);
      opacity: 0.7;
      animation: gemPulse 2.6s ease-in-out infinite;
    }
    .gem:nth-child(2) { animation-delay: 0.4s; }
    .gem:nth-child(3) { animation-delay: 0.8s; }
    @keyframes gemPulse {
      0%,100% { opacity: 0.3; transform: rotate(45deg) scale(0.8); }
      50%      { opacity: 1;   transform: rotate(45deg) scale(1.3); }
    }

    .main-text {
      font-family: 'Amiri', serif;
      font-size: clamp(1.3rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #b37a08;
      line-height: 1.55;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.2s;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: clamp(5px, 1.2vh, 12px);
    }
    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #d4920a;
      opacity: 0;
      animation: dotBlink 2.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }
    @keyframes dotBlink {
      0%,100% { opacity: 0;   transform: scale(0.7); }
      50%      { opacity: 0.8; transform: scale(1.2); }
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #d4920a;
      opacity: 0;
      animation: twinkle var(--dur) ease-in-out var(--del) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0;    transform: scale(0.5); }
      50%      { opacity: 0.55; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="stars" id="stars"></div>

      <span class="ornament-line"></span>

      <div class="gem-row">
        <div class="gem"></div>
        <div class="gem"></div>
        <div class="gem"></div>
      </div>

      <p class="main-text">الله يعطيكم العافية</p>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <span class="ornament-line bottom"></span>
    </div>
  </div>

  <script>
    const s = document.getElementById('stars');
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      el.className = 'star';
      el.style.cssText =
        `left:${Math.random()*95}%;top:${Math.random()*95}%;`
        + `--dur:${(2 + Math.random()*2.5).toFixed(2)}s;`
        + `--del:${(Math.random()*3).toFixed(2)}s;`;
      s.appendChild(el);
    }
  </script>
</body>
</html>
