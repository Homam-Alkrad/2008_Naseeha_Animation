<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تهانينا - نصيحة التعليمي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:       #fffdf6;
      --cream-2:     #fef9ec;
      --gold:        #d4920a;
      --gold-light:  #f0b429;
      --gold-pale:   #fde68a;
      --blue-deep:   #1e3a5f;
      --blue-mid:    #2c5282;
      --green:       #1a7a45;
      --red:         #c0392b;
      --text-dark:   #1a1209;
      --text-mid:    #4a3a1a;
      --text-soft:   #7a6540;
      --card-bg:     rgba(255, 253, 246, 0.88);
      --card-border: rgba(212, 146, 10, 0.3);
      --shadow:      rgba(100, 60, 0, 0.14);
      --naseeha-bg:  #f19f1a;
      --naseeha-fg:  #002a68;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--cream);
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
    }

    /* Subtle warm gradient bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,220,100,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(255,180,80,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,240,200,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -10%;
      animation: confetti-fall linear infinite;
    }

    @keyframes confetti-fall {
      0%   { top: -10%; transform: translateX(0) rotateZ(0deg) rotateY(0deg); }
      100% { top: 110%; transform: translateX(var(--dx, 80px)) rotateZ(520deg) rotateY(360deg); }
    }

    /* ── Card ── */
    #party-info {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;

      width: min(500px, 90vw);
      padding: clamp(20px, 5vw, 42px) clamp(18px, 5vw, 40px);

      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;

      backdrop-filter: blur(16px) saturate(1.8);
      -webkit-backdrop-filter: blur(16px) saturate(1.8);

      box-shadow:
        0 2px 0 rgba(255,255,255,0.9) inset,
        0 -1px 0 rgba(212,146,10,0.15) inset,
        0 8px 32px var(--shadow),
        0 24px 80px rgba(180,100,0,0.1),
        0 0 0 1px rgba(212,146,10,0.08);

      text-align: center;
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translate(-50%,-44%) scale(0.91); filter: blur(4px); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1);    filter: blur(0); }
    }

    /* Gold corner brackets */
    #party-info::before, #party-info::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.55;
      pointer-events: none;
    }
    #party-info::before { top: 14px; right: 14px; border-width: 2px 2px 0 0; border-radius: 0 7px 0 0; }
    #party-info::after  { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; border-radius: 0 0 0 7px; }

    /* ── Ornament SVG ── */
    .card-ornament { display: block; width: 100%; height: 24px; }
    .card-ornament-top    { margin-bottom: 14px; }
    .card-ornament-bottom { margin-top: 14px; }

    /* ── Title ── */
    .title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title-star {
      color: var(--gold-light);
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      animation: starSpin 4s ease-in-out infinite;
    }
    .title-star:last-child { animation-delay: 2s; }
    @keyframes starSpin {
      0%,100% { opacity: 0.4; transform: scale(0.85) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1.2) rotate(30deg); }
    }

    #card-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 5.5vw, 2.9rem);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.8),
        0 2px 12px rgba(212,146,10,0.2);
      animation: titleShimmer 5s ease-in-out infinite;
    }
    @keyframes titleShimmer {
      0%,100% { color: var(--gold); }
      50%      { color: #e8a50c; }
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 16px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,146,10,0.4), transparent);
    }
    .divider-gem {
      width: 6px; height: 6px;
      background: var(--gold-light);
      transform: rotate(45deg);
      opacity: 0.8;
      animation: gemPulse 2.5s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(240,180,41,0.4);
    }
    @keyframes gemPulse {
      0%,100% { transform: rotate(45deg) scale(0.9); opacity: 0.5; }
      50%      { transform: rotate(45deg) scale(1.3); opacity: 1; }
    }

    /* ── Message lines ── */
    .msg-line {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.9rem, 2.4vw, 1.08rem);
      font-weight: 400;
      color: var(--text-mid);
      line-height: 1.9;
      margin-bottom: 4px;
      opacity: 0;
      animation: lineUp 0.55s ease forwards;
    }
    .msg-line:nth-child(1) { animation-delay: 0.5s; }
    .msg-line:nth-child(2) { animation-delay: 0.72s; }
    .msg-line:nth-child(3) { animation-delay: 0.94s; }
    .msg-line:nth-child(4) { animation-delay: 1.16s; }

    @keyframes lineUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-line.highlight {
      font-weight: 800;
      font-size: clamp(0.98rem, 2.7vw, 1.18rem);
      color: var(--blue-deep);
      background: linear-gradient(135deg, rgba(240,180,41,0.1), rgba(255,220,100,0.18));
      border-radius: 8px;
      padding: 4px 10px;
      margin: 4px 0 6px;
    }

    /* ── Footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(212,146,10,0.14);
    }
    .footer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.5;
    }
    .footer-dot.big {
      width: 6px; height: 6px;
      opacity: 0.75;
      box-shadow: 0 0 4px rgba(212,146,10,0.4);
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 26px;
      background: linear-gradient(135deg, #f8a81a 0%, #f5c842 55%, #f0a010 100%);
      color: var(--naseeha-fg);
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.72rem, 1.8vw, 0.84rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      border-radius: 30px;
      box-shadow:
        0 2px 14px rgba(240,160,16,0.35),
        0 1px 0 rgba(255,255,255,0.35) inset;
      animation: badgeIn 0.5s ease 1.4s both;
    }
    @keyframes badgeIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Sparkles ── */
    .sparkle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkleAnim var(--dur, 2s) ease-in-out var(--del, 0s) infinite;
    }
    @keyframes sparkleAnim {
      0%,100% { opacity: 0; transform: scale(0); }
      45%,55% { opacity: 1; transform: scale(1); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      #party-info { border-radius: 20px; }
      .msg-line.highlight { padding: 3px 8px; }
    }
    @media (max-width: 360px) {
      #card-title { font-size: 1.6rem; }
      .msg-line   { font-size: 0.84rem; line-height: 1.7; }
    }
    @media (min-height: 860px) {
      #party-info { padding: 46px 44px; }
    }
  </style>
</head>
<body>

<canvas id="birthday"></canvas>
<div id="confetti"></div>

<!-- ════ CARD ════ -->
<div id="party-info">

  <svg class="card-ornament card-ornament-top" viewBox="0 0 400 24" fill="none" aria-hidden="true">
    <path d="M0 24 Q70 5 140 14 Q170 3 200 10 Q230 3 260 14 Q330 5 400 24"
      stroke="rgba(212,146,10,0.35)" stroke-width="1" fill="none"/>
    <polygon points="200,1 203,7 211,5 207,11 214,14 206,14 204,20 200,15 196,20 194,14 186,14 193,11 189,5 197,7"
      fill="rgba(212,146,10,0.65)"/>
    <circle cx="130" cy="13" r="2"   fill="rgba(212,146,10,0.38)"/>
    <circle cx="270" cy="13" r="2"   fill="rgba(212,146,10,0.38)"/>
    <circle cx="88"  cy="19" r="1.3" fill="rgba(212,146,10,0.24)"/>
    <circle cx="312" cy="19" r="1.3" fill="rgba(212,146,10,0.24)"/>
    <circle cx="48"  cy="22" r="1"   fill="rgba(212,146,10,0.15)"/>
    <circle cx="352" cy="22" r="1"   fill="rgba(212,146,10,0.15)"/>
  </svg>

  <div class="title-wrap">
    <span class="title-star">&#10022;</span>
    <h1 id="card-title"></h1>
    <span class="title-star">&#10022;</span>
  </div>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-gem"></span>
    <span class="divider-line"></span>
  </div>

  <div id="msg-container">
    <p class="msg-line"           id="line1"></p>
    <p class="msg-line highlight" id="line2"></p>
    <p class="msg-line"           id="line3"></p>
    <p class="msg-line"           id="line4"></p>
  </div>

  <div class="card-footer">
    <span class="footer-dot"></span>
    <span class="footer-dot big"></span>
    <span class="footer-dot"></span>
  </div>

  <span class="badge">موقع نصيحة التعليمي</span>

  <svg class="card-ornament card-ornament-bottom" viewBox="0 0 400 24" fill="none" aria-hidden="true">
    <path d="M0 24 Q70 5 140 14 Q170 3 200 10 Q230 3 260 14 Q330 5 400 24"
      stroke="rgba(212,146,10,0.35)" stroke-width="1" fill="none"/>
    <polygon points="200,1 203,7 211,5 207,11 214,14 206,14 204,20 200,15 196,20 194,14 186,14 193,11 189,5 197,7"
      fill="rgba(212,146,10,0.65)"/>
    <circle cx="130" cy="13" r="2"   fill="rgba(212,146,10,0.38)"/>
    <circle cx="270" cy="13" r="2"   fill="rgba(212,146,10,0.38)"/>
  </svg>

</div>

<script>
/* ── Messages ── */
(function() {
  var titles = [
    "أبدعت","تجاوزت المألوف","بلغت القمة","حققت المستحيل",
    "أدهشت العقول","صنعت الفارق","رسمت الإبداع","تخطيت التوقعات",
    "نسجت التميز","أتقنت الصنعة","سطرت النجاح","جسّدت الإتقان","لامست السحاب"
  ];
  var messages = [
    ["مش غريب عليك هاد التألق.","كنت بتطمح للقمة، وهلا إنت صرت القمة نفسها.","العلامة الكاملة مو بس رقم، هي مكافأة لتعبك وسهرك وإصرارك اللي ما بيلين.","كمل طريقك، إحنا دايمًا بضهرك وفخورين فيك وبكل خطوة بتعملها."],
    ["في ناس بتمر على النجاح مرور الكرام.","وفي ناس متلك، بتترك بصمة بكل مكان بتدخله.","مبروك العلامة الكاملة اللي بتشبه طموحك الصافي.","خليك دايمًا واثق إنك بتستحق الأفضل، لأنك ببساطة مبدع."],
    ["مين اللي سرق الأضواء وأخد العلامة الكاملة؟","أكيد الشخص اللي ما بنقدر نلحق على ذكائه وسرعته.","ألف مبروك يا بطل، هيك الشغل وإلا بلاش.","هلا صار وقت نحتفل فيك وبإنجازك اللي بيرفع الراس."],
    ["أبدعت فأبهرت.","مو بس وصلت للهدف، إنت تجاوزته بمراحل.","العلامة الكاملة لايقة عليك وعلى اجتهادك.","مبروك من القلب، ومن نجاح لنجاح أكبر إن شاء الله."],
    ["كل الكلمات بتعجز توصف فرحتنا فيك اليوم.","إنت مثال حي للنجاح اللي بيجي من تعب وشغف.","شكرًا لأنك رفعت راسنا، وشكرًا لأنك دايمًا بتثبت إنك الأفضل.","من القلب: إنجازك يستحق كل تقدير."],
    ["هالنتيجة مو صدفة أبدًا.","هي نتيجة ليالي سهر ومثابرة وعزيمة ما بتنكسر.","اليوم العالم كله لازم يعرف إنك إنسان استثنائي.","مبروك العلامة الكاملة، وإن شاء الله هاي بس البداية."],
    ["كم مرة حسّيت بالتعب وكمّلت؟","كم مرة فكّرت تستسلم بس رفضت؟ هاي النتيجة هي الجواب.","مبروك من كل قلوبنا — علامة كاملة تستحقها بجدارة.","الله يوفقك ويحفظك ويعطيك فوق ما تتمنى."],
    ["الكل بيحكي عن النجاح، بس إنت بتعيشه.","علامة كاملة من شخص كامل الطموح والإرادة.","ما في كلام بيوفّيك حقك، بس مبروك من أعماق القلب.","ضليت تشتغل بصمت، وهلا النتيجة بتحكي بصوت عالي."],
    ["إنت ما بتعرف كلمة مستحيل.","كل مرة بتثبت إنك فوق التوقعات بمراحل.","العلامة الكاملة شهادة على إنك بطل حقيقي.","كمل يا غالي، السما هي الحد بس إذا إنت سمحت."],
    ["لما بنسمع عن التفوق، بنتذكرك إنت أول شي.","مبروك — إنجازك فخر لكل اللي بيعرفوك.","هاي العلامة مو بس رقم، هي عنوان لشخصيتك القوية.","ربنا يكمل عليك ويزيدك من فضله."]
  ];
  document.getElementById('card-title').textContent = titles[Math.floor(Math.random()*titles.length)];
  var s = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById('line1').textContent = s[0];
  document.getElementById('line2').textContent = s[1];
  document.getElementById('line3').textContent = s[2];
  document.getElementById('line4').textContent = s[3];
})();

/* ── Sparkles ── */
(function() {
  var card   = document.getElementById('party-info');
  var colors = ['#f0b429','#f9d976','#e74c3c','#3498db','#27ae60','#fff'];
  for (var i = 0; i < 20; i++) {
    var el = document.createElement('div');
    el.className = 'sparkle';
    var sz = 2 + Math.random() * 4;
    el.style.cssText =
      'width:'+sz+'px;height:'+sz+'px;'
      +'left:'+(Math.random()*94)+'%;top:'+(Math.random()*94)+'%;'
      +'--del:'+(Math.random()*2.4).toFixed(2)+'s;'
      +'--dur:'+(1.5+Math.random()*1.5).toFixed(2)+'s;'
      +'background:'+colors[Math.floor(Math.random()*colors.length)]+';'
      +'opacity:0;box-shadow:0 0 4px currentColor;';
    card.appendChild(el);
  }
})();

/* ── Fireworks ── */
const PI2 = Math.PI*2;
const rnd  = (a,b) => Math.random()*(b-a)+a;
const rndI = (a,b) => (Math.random()*(b-a+1)+a)|0;
const ts   = () => Date.now();

class Birthday {
  constructor() { this.fw=[]; this.pt=[]; this.ctr=0; this.resize(); }
  resize() {
    this.w = canvas.width  = window.innerWidth;
    this.h = canvas.height = window.innerHeight;
    const c=this.w/2;
    this.sA=c-c/3; this.sB=c+c/3;
    this.sC=this.h*0.12; this.sD=this.h*0.45;
  }
  update(dt) {
    // Light trail: semi-transparent white fade
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(255,253,246,0.22)';
    ctx.fillRect(0,0,this.w,this.h);
    ctx.globalCompositeOperation='source-over';
    this.fw.forEach(f=>f.update(dt));
    this.pt.forEach(p=>p.update(dt));
    this.ctr+=dt*3.2;
    if(this.ctr>=1){
      this.fw.push(new FW(rnd(this.sA,this.sB),this.h,rnd(this.w*.15,this.w*.85),rnd(this.sC,this.sD),rndI(0,360)));
      this.ctr=0;
    }
    this.fw=this.fw.filter(f=>!f.dead);
    this.pt=this.pt.filter(p=>!p.dead);
  }
}

class FW {
  constructor(x,y,tx,ty,sh){this.dead=false;this.x=x;this.y=y;this.tx=tx;this.ty=ty;this.sh=sh;this.hist=[];this.vel=0;this.acc=1.05;this.ex=false;}
  update(dt){
    if(this.dead)return;
    const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>5){
      this.vel+=this.acc*dt*60;
      const a=Math.atan2(dy,dx);
      this.x+=Math.cos(a)*this.vel*dt*60;
      this.y+=Math.sin(a)*this.vel*dt*60;
      this.hist.push({x:this.x,y:this.y});
      if(this.hist.length>8)this.hist.shift();
    } else {
      if(!this.ex){this.explode();this.ex=true;}
      this.hist.shift();
    }
    if(!this.hist.length)this.dead=true;
    this.hist.forEach((p,i)=>{
      const al=i/this.hist.length;
      ctx.beginPath();
      ctx.fillStyle=`hsla(${this.sh},90%,48%,${al})`;
      ctx.arc(p.x,p.y,2.8,0,PI2);
      ctx.fill();
    });
  }
  explode(){
    const n=rndI(140,200);
    const types=['burst','ring','willow','palm','spiral','heart'];
    const tp=types[rndI(0,types.length-1)];
    for(let i=0;i<n;i++){
      let a,sp,lf;
      if(tp==='burst'){a=rnd(0,PI2);sp=rnd(3,10);lf=rnd(1,2);}
      else if(tp==='ring'){a=(PI2/n)*i;sp=rnd(5,8);lf=rnd(1.2,2.2);}
      else if(tp==='willow'){a=rnd(0,PI2);sp=rnd(2,6);lf=rnd(2,3);}
      else if(tp==='palm'){a=rnd(-Math.PI/3,-Math.PI*2/3);sp=rnd(4,9);lf=rnd(1.5,2.5);}
      else if(tp==='spiral'){a=(PI2/n)*i+rnd(0,Math.PI/4);sp=rnd(3,7);lf=rnd(1.5,2.5);}
      else{const t=(i/n)*PI2;a=Math.atan2(Math.sin(t)-Math.sin(2*t)/2,Math.cos(t)-Math.cos(2*t)/2);sp=rnd(4,8);lf=rnd(1.5,2.5);}
      bday.pt.push(new PT(this.x,this.y,a,sp,this.sh,lf,tp));
    }
  }
}

class PT {
  constructor(x,y,a,sp,sh,lf,tp){
    this.x=x;this.y=y;
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.sh=sh+rndI(-20,20);this.lf=lf;this.mlf=lf;this.dead=false;
    this.grav=tp==='willow'?.14:.07;this.fric=tp==='ring'?.98:.96;
    this.sz=rnd(1.8,3.6);
  }
  update(dt){
    if(this.dead)return;
    this.lf-=dt;if(this.lf<=0){this.dead=true;return;}
    this.vx*=this.fric;this.vy*=this.fric;this.vy+=this.grav;
    this.x+=this.vx;this.y+=this.vy;
    const al=this.lf/this.mlf;
    // On light bg: use darker, more saturated colors
    const l=38+al*22;
    ctx.beginPath();
    ctx.fillStyle=`hsla(${this.sh},88%,${l}%,${al*0.9})`;
    ctx.arc(this.x,this.y,this.sz*al,0,PI2);
    ctx.fill();
    if(al>0.55){
      ctx.beginPath();
      ctx.fillStyle=`hsla(${this.sh},88%,${l+15}%,${al*0.18})`;
      ctx.arc(this.x,this.y,this.sz*al*2.1,0,PI2);
      ctx.fill();
    }
  }
}

const canvas = document.getElementById('birthday');
const ctx    = canvas.getContext('2d');
let then = ts();
const bday = new Birthday();
window.onresize = () => bday.resize();
(function loop(){
  requestAnimationFrame(loop);
  const now=ts();
  bday.update(Math.min((now-then)/1000,.1));
  then=now;
})();

/* ── Confetti ── */
(function(){
  const wrap   = document.getElementById('confetti');
  const colors = ['#e74c3c','#f0b429','#3498db','#9b59b6','#1abc9c','#e67e22','#f1c40f','#27ae60','#e84393'];
  const count  = window.innerWidth < 480 ? 80 : 150;
  for(let i=0;i<count;i++){
    const el  = document.createElement('div');
    el.className = 'confetti-piece';
    const size = Math.random()*11+5;
    const sh   = rndI(0,3);
    let w=size,h=size,r='3px';
    if(sh===1){r='50%';}
    else if(sh===2){w=size*1.9;h=size*0.65;r='2px';}
    else if(sh===3){w=size*0.4;h=size*2.1;r='2px';}
    const dx=(Math.random()-.5)*160;
    el.style.cssText=
      `width:${w}px;height:${h}px;border-radius:${r};`
      +`background:${colors[rndI(0,colors.length-1)]};`
      +`left:${Math.random()*100}%;--dx:${dx}px;`
      +`animation-duration:${(Math.random()*3+2).toFixed(2)}s;`
      +`animation-delay:${(Math.random()*6).toFixed(2)}s;`
      +`opacity:${(Math.random()*.55+0.45).toFixed(2)};`;
    wrap.appendChild(el);
  }
})();
</script>
