<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تهنئة رمضانية مميزة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ════════ SVG SCENE ════════ -->
<svg id="bg-svg" class="scene" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Sky gradient (stops updated by JS) -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop id="sky-stop-0" offset="0%"   stop-color="#020b1a"/>
      <stop id="sky-stop-1" offset="50%"  stop-color="#091c3a"/>
      <stop id="sky-stop-2" offset="100%" stop-color="#0b1a30"/>
    </linearGradient>

    <!-- Moon-side sky glow -->
    <radialGradient id="skyGlow" cx="82%" cy="18%" r="38%">
      <stop id="sky-glow-stop" offset="0%" stop-color="#1a3560" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizon ambient glow (updated by JS) -->
    <radialGradient id="horizonGlow" cx="50%" cy="72%" r="52%">
      <stop id="horizon-glow-stop" offset="0%" stop-color="#162d4f" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Ground (stops updated by JS) -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop id="ground-stop-0" offset="0%"   stop-color="#10223a"/>
      <stop id="ground-stop-1" offset="100%" stop-color="#060e1c"/>
    </linearGradient>

    <!-- Moon -->
    <radialGradient id="moonFace" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="50%" stop-color="#f5d87a"/>
      <stop offset="100%" stop-color="#d4a832"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8a3" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#e8b730" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonHaloInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8a3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="craterShade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9962a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c9962a" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun -->
    <radialGradient id="sunGlowOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffb830" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlowInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde8" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffe480" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb830" stop-opacity="0"/>
    </radialGradient>

    <!-- Mosque windows -->
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d87a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Cannon flash -->
    <radialGradient id="flashGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#f7c963" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f7c963" stop-opacity="0"/>
    </radialGradient>

    <!-- Shooting star trail -->
    <linearGradient id="shootGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Cloud -->
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--cloud-color,#1a3050)" stop-opacity="0"/>
      <stop offset="30%" stop-color="var(--cloud-color,#1a3050)" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="var(--cloud-color,#1a3050)" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="var(--cloud-color,#1a3050)" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="softBlur"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.2"/></filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunBlur"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="bulbGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Sky ── -->
  <rect width="1600" height="900" fill="url(#skyGrad)"/>
  <rect width="1600" height="900" fill="url(#skyGlow)"/>
  <rect width="1600" height="900" fill="url(#horizonGlow)"/>

  <!-- Milky way hint (night only) -->
  <ellipse id="milky-way" cx="600" cy="200" rx="500" ry="80" fill="#1a2a48" opacity="0.07" transform="rotate(-15 600 200)"/>

  <!-- Nebula hints -->
  <circle id="nebula-1" cx="350" cy="250" r="120" fill="#2a1a40" opacity="0.05" filter="url(#softBlur)"/>
  <circle id="nebula-2" cx="1100" cy="150" r="80" fill="#1a2040" opacity="0.06" filter="url(#softBlur)"/>

  <!-- ── Stars - far (tiny, many) ── -->
  <g id="stars-far" opacity="0.6">
    <circle cx="50"   cy="48"  r="0.8" fill="#c8d6f0" class="star" style="--dur:4.2s;--delay:0.3s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="142"  cy="76"  r="0.6" fill="#e0eaff" class="star" style="--dur:5.1s;--delay:1.2s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="230"  cy="32"  r="0.7" fill="#dde8ff" class="star" style="--dur:3.8s;--delay:2.1s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="380"  cy="55"  r="0.9" fill="#c8d6f0" class="star" style="--dur:4.5s;--delay:0.8s;--min-o:0.08;--max-o:0.5"/>
    <circle cx="490"  cy="38"  r="0.6" fill="#e0eaff" class="star" style="--dur:3.5s;--delay:1.5s;--min-o:0.1;--max-o:0.4"/>
    <circle cx="620"  cy="62"  r="0.8" fill="#dde8ff" class="star" style="--dur:4.8s;--delay:0.4s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="780"  cy="44"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.3s;--delay:2.5s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="880"  cy="72"  r="0.6" fill="#e0eaff" class="star" style="--dur:3.9s;--delay:1.8s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="990"  cy="28"  r="0.9" fill="#dde8ff" class="star" style="--dur:4.1s;--delay:0.6s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="1150" cy="58"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.5s;--delay:1.1s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="1320" cy="35"  r="0.8" fill="#e0eaff" class="star" style="--dur:3.6s;--delay:2.3s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="1480" cy="68"  r="0.6" fill="#dde8ff" class="star" style="--dur:4.4s;--delay:0.9s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="1550" cy="42"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.2s;--delay:1.6s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="105"  cy="155" r="0.6" fill="#e0eaff" class="star" style="--dur:4.6s;--delay:2.7s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="310"  cy="178" r="0.8" fill="#dde8ff" class="star" style="--dur:3.7s;--delay:0.2s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="560"  cy="195" r="0.7" fill="#c8d6f0" class="star" style="--dur:5.0s;--delay:1.4s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="695"  cy="168" r="0.9" fill="#e0eaff" class="star" style="--dur:4.3s;--delay:0.7s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="870"  cy="148" r="0.6" fill="#dde8ff" class="star" style="--dur:3.4s;--delay:2.0s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="1040" cy="188" r="0.8" fill="#c8d6f0" class="star" style="--dur:4.9s;--delay:1.3s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="1240" cy="165" r="0.7" fill="#e0eaff" class="star" style="--dur:5.4s;--delay:0.5s;--min-o:0.08;--max-o:0.5"/>
    <circle cx="1440" cy="182" r="0.6" fill="#dde8ff" class="star" style="--dur:3.3s;--delay:1.9s;--min-o:0.1;--max-o:0.4"/>
    <circle cx="72"   cy="260" r="0.7" fill="#c8d6f0" class="star" style="--dur:4.7s;--delay:0.6s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="420"  cy="280" r="0.5" fill="#e0eaff" class="star" style="--dur:5.6s;--delay:2.4s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="1360" cy="95"  r="0.8" fill="#dde8ff" class="star" style="--dur:3.9s;--delay:1.0s;--min-o:0.1;--max-o:0.5"/>
  </g>

  <!-- ── Stars - mid ── -->
  <g id="stars-mid">
    <circle cx="180"  cy="118" r="1.8" fill="#e7f0ff" class="star" filter="url(#tinyBlur)" style="--dur:3.2s;--delay:0.2s;--min-o:0.12;--max-o:0.85"/>
    <circle cx="360"  cy="90"  r="1.5" fill="#f6fbff" class="star" style="--dur:3.8s;--delay:1.6s;--min-o:0.1;--max-o:0.8"/>
    <circle cx="520"  cy="155" r="1.9" fill="#ecf3ff" class="star" filter="url(#tinyBlur)" style="--dur:2.8s;--delay:0.5s;--min-o:0.15;--max-o:0.9"/>
    <circle cx="740"  cy="108" r="2.2" fill="#ffffff" class="star" style="--dur:3.5s;--delay:2.2s;--min-o:0.12;--max-o:0.95"/>
    <circle cx="910"  cy="205" r="1.7" fill="#e3edff" class="star" style="--dur:4.0s;--delay:0.9s;--min-o:0.1;--max-o:0.8"/>
    <circle cx="1100" cy="88"  r="2.0" fill="#fbfdff" class="star" filter="url(#tinyBlur)" style="--dur:3.0s;--delay:1.1s;--min-o:0.15;--max-o:0.9"/>
    <circle cx="1430" cy="235" r="1.8" fill="#e6efff" class="star" style="--dur:3.6s;--delay:1.8s;--min-o:0.12;--max-o:0.85"/>
    <circle cx="1490" cy="135" r="1.6" fill="#ffffff" class="star" style="--dur:2.6s;--delay:0.7s;--min-o:0.1;--max-o:0.9"/>
  </g>

  <!-- ── Stars - near (bright, cross-shaped) ── -->
  <g id="stars-near" filter="url(#starGlow)">
    <g class="star-cross" style="--dur:4.5s;--delay:0.3s;--min-o:0.2;--max-o:1">
      <line x1="258" y1="192" x2="262" y2="208" stroke="#fff" stroke-width="1.2"/>
      <line x1="252" y1="200" x2="268" y2="200" stroke="#fff" stroke-width="1.2"/>
    </g>
    <g class="star-cross" style="--dur:5s;--delay:1.5s;--min-o:0.15;--max-o:0.95">
      <line x1="648" y1="78" x2="652" y2="92" stroke="#e8f0ff" stroke-width="1"/>
      <line x1="643" y1="85" x2="657" y2="85" stroke="#e8f0ff" stroke-width="1"/>
    </g>
    <g class="star-cross" style="--dur:3.8s;--delay:2s;--min-o:0.18;--max-o:1">
      <line x1="1058" y1="172" x2="1062" y2="188" stroke="#fff" stroke-width="1.3"/>
      <line x1="1052" y1="180" x2="1068" y2="180" stroke="#fff" stroke-width="1.3"/>
    </g>
    <g class="star-cross" style="--dur:4.2s;--delay:0.8s;--min-o:0.2;--max-o:0.9">
      <line x1="448" y1="268" x2="452" y2="280" stroke="#dde8ff" stroke-width="1"/>
      <line x1="443" y1="274" x2="457" y2="274" stroke="#dde8ff" stroke-width="1"/>
    </g>
  </g>

  <!-- ── Shooting stars ── -->
  <g id="shooting-stars">
    <line class="shooting-star" x1="480" y1="80" x2="530" y2="80"
      stroke="url(#shootGrad)" stroke-width="2" stroke-linecap="round"
      style="--shoot-dur:6s;--shoot-delay:2s;--dx:-200px;--dy:110px"
      transform="rotate(30 480 80)"/>
    <line class="shooting-star" x1="1050" y1="120" x2="1100" y2="120"
      stroke="url(#shootGrad)" stroke-width="1.6" stroke-linecap="round"
      style="--shoot-dur:9s;--shoot-delay:5s;--dx:-240px;--dy:140px"
      transform="rotate(28 1050 120)"/>
    <line class="shooting-star" x1="200" y1="200" x2="245" y2="200"
      stroke="url(#shootGrad)" stroke-width="1.3" stroke-linecap="round"
      style="--shoot-dur:12s;--shoot-delay:9s;--dx:-170px;--dy:95px"
      transform="rotate(32 200 200)"/>
  </g>

  <!-- ── Sun (hidden at night, positioned by JS) ── -->
  <g id="sun-group" opacity="0">
    <circle id="sun-halo" cx="800" cy="200" r="160" fill="url(#sunGlowOuter)" filter="url(#sunBlur)"/>
    <circle id="sun-glow" cx="800" cy="200" r="80" fill="url(#sunGlowInner)"/>
    <circle id="sun-core" cx="800" cy="200" r="36" fill="#fff8e0"/>
    <g id="sun-rays" opacity="0.25">
      <line x1="800" y1="120" x2="800" y2="140" stroke="#ffe480" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="800" y1="260" x2="800" y2="280" stroke="#ffe480" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="720" y1="200" x2="740" y2="200" stroke="#ffe480" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="860" y1="200" x2="880" y2="200" stroke="#ffe480" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="744" y1="144" x2="758" y2="158" stroke="#ffe480" stroke-width="2" stroke-linecap="round"/>
      <line x1="842" y1="242" x2="856" y2="256" stroke="#ffe480" stroke-width="2" stroke-linecap="round"/>
      <line x1="744" y1="256" x2="758" y2="242" stroke="#ffe480" stroke-width="2" stroke-linecap="round"/>
      <line x1="842" y1="158" x2="856" y2="144" stroke="#ffe480" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ── Moon ── -->
  <g id="moon-group" opacity="1">
    <circle cx="1285" cy="170" r="130" fill="url(#moonHalo)" class="moon-halo-outer"/>
    <circle cx="1285" cy="170" r="90"  fill="url(#moonHaloInner)" class="moon-halo-inner"/>
    <g class="moon-body">
      <circle cx="1285" cy="170" r="60" fill="url(#moonFace)" class="moon-glow"/>
      <circle cx="1314" cy="155" r="60" fill="var(--sky-shadow,#0a1e3d)" class="moon-glow"/>
      <circle cx="1268" cy="155" r="6" fill="url(#craterShade)" opacity="0.3"/>
      <circle cx="1255" cy="178" r="4" fill="url(#craterShade)" opacity="0.25"/>
      <circle cx="1275" cy="195" r="5" fill="url(#craterShade)" opacity="0.2"/>
      <circle cx="1262" cy="140" r="3" fill="url(#craterShade)" opacity="0.2"/>
      <circle cx="1250" cy="165" r="2.5" fill="url(#craterShade)" opacity="0.15"/>
    </g>
  </g>

  <!-- ── Clouds ── -->
  <g id="clouds">
    <g class="cloud" style="--cloud-speed:120s">
      <ellipse cx="300" cy="320" rx="190" ry="20" fill="var(--cloud-fill,rgba(26,48,80,0.22))"/>
      <ellipse cx="345" cy="313" rx="130" ry="14" fill="var(--cloud-fill,rgba(26,48,80,0.16))"/>
    </g>
    <g class="cloud" style="--cloud-speed:95s">
      <ellipse cx="900" cy="260" rx="170" ry="16" fill="var(--cloud-fill,rgba(26,48,80,0.18))"/>
      <ellipse cx="870" cy="254" rx="100" ry="10" fill="var(--cloud-fill,rgba(26,48,80,0.12))"/>
    </g>
    <g class="cloud" style="--cloud-speed:140s">
      <ellipse cx="1350" cy="350" rx="210" ry="18" fill="var(--cloud-fill,rgba(26,48,80,0.16))"/>
    </g>
    <g class="cloud" style="--cloud-speed:160s">
      <ellipse cx="600" cy="380" rx="150" ry="12" fill="var(--cloud-fill,rgba(26,48,80,0.12))"/>
    </g>
  </g>

  <!-- ── Birds (visible during daytime) ── -->
  <g id="birds" opacity="0">
    <g>
      <animateTransform attributeName="transform" type="translate"
        from="1750,190" to="-120,170" dur="38s" repeatCount="indefinite"/>
      <path d="M0 0 C-5 -6 -12 -4 -16 0 M0 0 C5 -6 12 -4 16 0"
        stroke="var(--bird-color,#1a2a40)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        from="1850,230" to="-150,210" dur="44s" repeatCount="indefinite" begin="6s"/>
      <path d="M0 0 C-4 -5 -10 -3 -13 0 M0 0 C4 -5 10 -3 13 0"
        stroke="var(--bird-color,#1a2a40)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        from="1900,165" to="-100,145" dur="52s" repeatCount="indefinite" begin="12s"/>
      <path d="M0 0 C-3 -4 -8 -2 -10 0 M0 0 C3 -4 8 -2 10 0"
        stroke="var(--bird-color,#1a2a40)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        from="1780,250" to="-130,240" dur="48s" repeatCount="indefinite" begin="18s"/>
      <path d="M0 0 C-4 -5 -9 -3 -12 0 M0 0 C4 -5 9 -3 12 0"
        stroke="var(--bird-color,#1a2a40)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        from="1820,205" to="-140,185" dur="56s" repeatCount="indefinite" begin="24s"/>
      <path d="M0 0 C-3 -4 -7 -2 -9 0 M0 0 C3 -4 7 -2 9 0"
        stroke="var(--bird-color,#1a2a40)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ── Ground ── -->
  <path d="M0 625 C180 590 380 660 620 620 C850 590 1050 665 1300 628 C1450 615 1540 640 1600 625 L1600 900 L0 900Z"
    fill="url(#groundGrad)"/>
  <path d="M0 650 C280 632 550 668 850 645 C1150 625 1380 660 1600 648 L1600 900 L0 900Z"
    fill="#060e1c" opacity="0.35"/>
  <path d="M0 700 C400 690 800 710 1200 695 C1400 688 1600 705 1600 700 L1600 900 L0 900Z"
    fill="#040a14" opacity="0.25"/>

  <!-- ── Distant city silhouette ── -->
  <g id="distant-city" fill="#080f1e" opacity="0.35">
    <rect x="40"   y="598" width="55"  height="42" rx="2"/>
    <rect x="55"   y="588" width="25"  height="52" rx="1"/>
    <rect x="120"  y="605" width="35"  height="35" rx="2"/>
    <rect x="1420" y="600" width="45"  height="40" rx="2"/>
    <rect x="1440" y="585" width="22"  height="55" rx="1"/>
    <rect x="1500" y="595" width="50"  height="45" rx="2"/>
    <rect x="1520" y="580" width="18"  height="60" rx="1"/>
  </g>

  <!-- ── Mosque ── -->
  <g id="mosque" fill="var(--mosque-color,#070e1e)">
    <!-- Main body -->
    <rect x="310" y="530" width="980" height="220" rx="4"/>

    <!-- Crenellations (teeth) along roofline -->
    <g>
      <rect x="310" y="522" width="14" height="12" rx="1"/>
      <rect x="332" y="522" width="14" height="12" rx="1"/>
      <rect x="564" y="522" width="14" height="12" rx="1"/>
      <rect x="586" y="522" width="14" height="12" rx="1"/>
      <rect x="920" y="522" width="14" height="12" rx="1"/>
      <rect x="942" y="522" width="14" height="12" rx="1"/>
      <rect x="1130" y="522" width="14" height="12" rx="1"/>
      <rect x="1152" y="522" width="14" height="12" rx="1"/>
      <rect x="1268" y="522" width="14" height="12" rx="1"/>
