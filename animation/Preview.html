<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النصيحة - إعلان الجوائز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   NEW PALETTE — warm earth + antique gold
   Light, airy feel with deep accents
═══════════════════════════════════════════ */
#naseeha-demo-root {
  /* Gold spectrum */
  --nd-gold: #c9a84c;
  --nd-gold-light: #ddc06e;
  --nd-gold-deep: #8a7030;
  --nd-gold-glow: rgba(201, 168, 76, 0.30);
  --nd-gold-soft: rgba(201, 168, 76, 0.12);

  /* Earth / brown spectrum */
  --nd-earth: #6b5e4f;
  --nd-earth-dark: #4a3e32;
  --nd-earth-deep: #2a2418;

  /* Surface / cream */
  --nd-cream: #FAF8F3;
  --nd-cream-mid: #f5f0e6;
  --nd-wheat: #f5deb3;
  --nd-white: #ffffff;

  /* Green accent */
  --nd-green: #1a7a2e;
  --nd-green-soft: rgba(26, 122, 46, 0.10);
  --nd-green-glow: rgba(26, 122, 46, 0.20);

  /* Text */
  --nd-text-main: #3d3428;
  --nd-text-mid: #6b5e4f;
  --nd-text-light: #9a8d7e;

  /* Borders */
  --nd-border: rgba(201, 168, 76, 0.18);
  --nd-border-earth: rgba(74, 62, 50, 0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

#naseeha-demo-root {
  direction: rtl;
  font-family: 'Cairo', sans-serif;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  width: 100%;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(26,122,46,0.03) 0%, transparent 50%),
    linear-gradient(168deg, #FDFCF9 0%, var(--nd-cream) 35%, #f3ede1 65%, #FAF8F3 100%);
  overflow-x: hidden;
}

/* Subtle grain texture overlay */
#naseeha-demo-root::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   CHEMISTRY BACKGROUND
═══════════════════════════════════════════ */
#naseeha-demo-chem-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.naseeha-demo-mol {
  position: absolute;
  color: var(--nd-earth);
  opacity: 0.045;
  animation: naseeha-demo-floatMol 20s ease-in-out infinite;
}
.naseeha-demo-mol-1 { top: 6%; right: 3%; width: 95px; height: 95px; animation-duration: 18s; }
.naseeha-demo-mol-2 { bottom: 10%; left: 2%; width: 105px; height: 60px; animation-duration: 24s; animation-delay: -6s; }
.naseeha-demo-mol-3 { top: 48%; right: 1%; width: 70px; height: 70px; animation-duration: 22s; animation-delay: -10s; }
.naseeha-demo-mol-4 { top: 20%; left: 1%; width: 80px; height: 80px; animation-duration: 26s; animation-delay: -14s; opacity: 0.03; }

@keyframes naseeha-demo-floatMol {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-14px) rotate(6deg); }
  66% { transform: translateY(10px) rotate(-4deg); }
}

.naseeha-demo-formula {
  position: absolute;
  font-family: 'Cairo', monospace;
  font-weight: 700;
  color: var(--nd-gold-deep);
  pointer-events: none;
  animation: naseeha-demo-floatFormula linear infinite;
}
.naseeha-demo-f1 { font-size: 1.5rem; opacity: 0.05; top: 12%; left: 7%;  animation-duration: 30s; }
.naseeha-demo-f2 { font-size: 1rem;   opacity: 0.04; top: 72%; right: 7%; animation-duration: 26s; animation-delay: -5s; }
.naseeha-demo-f3 { font-size: 2.2rem; opacity: 0.05; top: 38%; left: 1%;  animation-duration: 22s; animation-delay: -8s; }
.naseeha-demo-f4 { font-size: 1.1rem; opacity: 0.04; bottom: 18%; left: 14%; animation-duration: 28s; animation-delay: -3s; }
.naseeha-demo-f5 { font-size: 1.4rem; opacity: 0.04; top: 22%; right: 10%; animation-duration: 32s; animation-delay: -12s; }
.naseeha-demo-f6 { font-size: 1rem;   opacity: 0.05; bottom: 32%; right: 4%; animation-duration: 24s; animation-delay: -7s; }
.naseeha-demo-f7 { font-size: 1.6rem; opacity: 0.04; top: 58%; left: 5%;  animation-duration: 27s; animation-delay: -15s; }
.naseeha-demo-f8 { font-size: 1.1rem; opacity: 0.04; top: 84%; right: 12%; animation-duration: 29s; animation-delay: -2s; }

@keyframes naseeha-demo-floatFormula {
  0%   { transform: translateY(0) scale(1); }
  25%  { transform: translateY(-15px) scale(1.05); }
  50%  { transform: translateY(-5px) scale(0.97); }
  75%  { transform: translateY(-20px) scale(1.03); }
  100% { transform: translateY(0) scale(1); }
}

.naseeha-demo-atom-orbit { position: absolute; pointer-events: none; }
.naseeha-demo-orbit-1 { width: 100px; height: 100px; bottom: 4%; right: 4%; opacity: 0.05; }
.naseeha-demo-orbit-2 { width: 60px; height: 60px; top: 4%; left: 4%; opacity: 0.04; }
.naseeha-demo-orbit-3 { width: 75px; height: 75px; top: 65%; left: 2%; opacity: 0.035; }

.naseeha-demo-nucleus {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  background: var(--nd-gold);
  border-radius: 50%;
}
.naseeha-demo-nucleus-sm { width: 6px; height: 6px; }

.naseeha-demo-electron-ring {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 1.5px solid var(--nd-gold-deep);
  transform-origin: center;
}
.naseeha-demo-ring-a { width: 70px; height: 32px; margin-top: -16px; margin-left: -35px; animation: naseeha-demo-spinRing 4s linear infinite; }
.naseeha-demo-ring-b { width: 70px; height: 32px; margin-top: -16px; margin-left: -35px; animation: naseeha-demo-spinRing 6s linear infinite reverse; transform: rotate(60deg); }
.naseeha-demo-ring-c { width: 44px; height: 22px; margin-top: -11px; margin-left: -22px; animation: naseeha-demo-spinRing 5s linear infinite; }
.naseeha-demo-ring-d { width: 55px; height: 26px; margin-top: -13px; margin-left: -27px; animation: naseeha-demo-spinRing 7s linear infinite; }

@keyframes naseeha-demo-spinRing {
  from { transform: rotateX(70deg) rotateZ(0deg); }
  to { transform: rotateX(70deg) rotateZ(360deg); }
}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
#naseeha-demo-card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 780px;
  margin: 40px 20px;
  animation: naseeha-demo-cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes naseeha-demo-cardReveal {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.naseeha-demo-card-inner {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 22px;
  box-shadow:
    0 0 0 1px var(--nd-border),
    0 1px 3px rgba(74, 62, 50, 0.04),
    0 8px 24px rgba(74, 62, 50, 0.06),
    0 32px 80px rgba(42, 36, 24, 0.10),
    0 64px 120px rgba(42, 36, 24, 0.04);
  overflow: hidden;
  position: relative;
}

/* Inner highlight line */
.naseeha-demo-card-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  z-index: 2;
}

/* Top shimmer border */
.naseeha-demo-top-border {
  height: 5px;
  background: linear-gradient(90deg,
    var(--nd-earth-dark) 0%,
    var(--nd-gold-deep) 20%,
    var(--nd-gold) 35%,
    var(--nd-gold-light) 50%,
    var(--nd-gold) 65%,
    var(--nd-gold-deep) 80%,
    var(--nd-earth-dark) 100%
  );
  background-size: 200% 100%;
  animation: naseeha-demo-shimmerBorder 4s ease-in-out infinite;
}
@keyframes naseeha-demo-shimmerBorder {
  0%, 100% { background-position: 0% 0%; }
  50% { background-position: 100% 0%; }
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.naseeha-demo-header {
  padding: 38px 40px 12px;
  text-align: center;
  position: relative;
}

.naseeha-demo-header::before {
  content: '';
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  width: 280px; height: 80px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.naseeha-demo-title {
  font-family: 'Amiri', serif;
  font-size: 2.2rem;
  color: var(--nd-earth-dark);
  line-height: 1.5;
  margin: 0;
  position: relative;
  animation: naseeha-demo-cardReveal 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
}

/* ═══════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════ */
.naseeha-demo-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 6px 0;
  padding: 0 36px;
  animation: naseeha-demo-cardReveal 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.naseeha-demo-divider::before, .naseeha-demo-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--nd-gold-soft), rgba(201,168,76,0.22), var(--nd-gold-soft), transparent);
  margin: 0 18px;
}
.naseeha-demo-divider span {
  font-family: 'Amiri', serif;
  font-size: 0.95rem;
  color: var(--nd-text-light);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   BODY
═══════════════════════════════════════════ */
.naseeha-demo-body {
  padding: 20px 40px 8px;
  animation: naseeha-demo-cardReveal 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.naseeha-demo-content {
  font-size: 1.12rem;
  line-height: 2.2;
  color: var(--nd-text-main);
  font-weight: 600;
}
.naseeha-demo-content p { margin: 0 0 14px 0; }

.naseeha-demo-day {
  font-weight: 900;
  color: var(--nd-green);
}

.naseeha-demo-bold {
  font-weight: 900;
  color: var(--nd-earth-dark);
}

/* Highlight strip */
.naseeha-demo-highlight {
  background: linear-gradient(135deg,
    rgba(245,222,179,0.25) 0%,
    rgba(201,168,76,0.10) 50%,
    rgba(245,222,179,0.20) 100%
  );
  padding: 20px 26px;
  margin: 16px 0 18px;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.15);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
}

.naseeha-demo-highlight::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(201,168,76,0.03), transparent, rgba(201,168,76,0.04), transparent);
  animation: naseeha-demo-rotateBg 18s linear infinite;
  pointer-events: none;
}
@keyframes naseeha-demo-rotateBg { to { transform: rotate(360deg); } }

/* Decorative side accent line */
.naseeha-demo-highlight::after {
  content: '';
  position: absolute;
  top: 12px; bottom: 12px; right: 0;
  width: 4px;
  border-radius: 2px;
  background: linear-gradient(to bottom, var(--nd-gold), var(--nd-gold-deep));
  opacity: 0.5;
}

.naseeha-demo-highlight p {
  margin: 0;
  color: var(--nd-earth-dark);
  font-weight: 700;
  position: relative;
  z-index: 1;
}

.naseeha-demo-counter-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: linear-gradient(135deg, var(--nd-gold), var(--nd-gold-light));
  color: var(--nd-white);
  padding: 2px 16px;
  border-radius: 100px;
  font-weight: 900;
  font-size: 1rem;
  margin: 0 4px;
  box-shadow: 0 2px 12px var(--nd-gold-glow);
  vertical-align: middle;
}

.naseeha-demo-trophy {
  display: inline-block;
  font-size: 1.4rem;
  margin-left: 5px;
  animation: naseeha-demo-trophyBob 2.2s ease-in-out infinite;
  vertical-align: middle;
}
@keyframes naseeha-demo-trophyBob {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  30% { transform: translateY(-5px) rotate(-5deg); }
  60% { transform: translateY(-2px) rotate(4deg); }
}

/* ═══════════════════════════════════════════
   CONGRATS
═══════════════════════════════════════════ */
.naseeha-demo-congrats-wrap {
  text-align: center;
  padding: 0 40px;
  animation: naseeha-demo-cardReveal 0.8s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.naseeha-demo-congrats-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 18px 0;
}
.naseeha-demo-congrats-divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--nd-border-earth), transparent);
}
.naseeha-demo-congrats-diamond {
  width: 7px; height: 7px;
  background: var(--nd-gold);
  transform: rotate(45deg);
  flex-shrink: 0;
  box-shadow: 0 0 8px var(--nd-gold-glow);
}

.naseeha-demo-congrats-text {
  font-family: 'Amiri', serif;
  font-size: 1.4rem;
  color: var(--nd-earth);
  font-weight: 700;
  line-height: 2;
  margin: 10px 0;
}

/* ═══════════════════════════════════════════
   DATE BANNER
═══════════════════════════════════════════ */
.naseeha-demo-date-section {
  padding: 0 40px;
  animation: naseeha-demo-cardReveal 0.8s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.naseeha-demo-date-banner {
  background: linear-gradient(135deg,
    var(--nd-earth-deep) 0%,
    var(--nd-earth-dark) 40%,
    #3d3428 60%,
    var(--nd-earth-deep) 100%
  );
  border-radius: 16px;
  padding: 30px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 8px 32px rgba(42, 36, 24, 0.30),
    0 2px 6px rgba(42, 36, 24, 0.15),
    inset 0 1px 0 rgba(201,168,76,0.10);
}

.naseeha-demo-date-banner::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 25% 30%, rgba(201,168,76,0.12), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(201,168,76,0.08), transparent 55%);
  pointer-events: none;
}

.naseeha-demo-date-banner::after {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: repeating-linear-gradient(
    115deg,
    transparent,
    transparent 20px,
    rgba(201,168,76,0.025) 20px,
    rgba(201,168,76,0.025) 40px
  );
  animation: naseeha-demo-bannerStripes 20s linear infinite;
  pointer-events: none;
}
@keyframes naseeha-demo-bannerStripes {
  to { transform: translateX(40px); }
}

.naseeha-demo-date-label {
  position: relative; z-index: 1;
  font-size: 0.75rem;
  color: rgba(245,222,179,0.50);
  letter-spacing: 5px;
  margin-bottom: 10px;
  font-weight: 600;
  text-transform: uppercase;
}

.naseeha-demo-date-value {
  position: relative; z-index: 1;
  font-family: 'Amiri', serif;
  font-size: 2.3rem;
  color: var(--nd-gold-light);
  font-weight: 700;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.naseeha-demo-date-sub {
  position: relative; z-index: 1;
  font-size: 0.92rem;
  color: rgba(245,222,179,0.65);
  font-weight: 600;
}

/* ═══════════════════════════════════════════
   IMAGE SECTION — 90% wide, curtain reveal
═══════════════════════════════════════════ */
.naseeha-demo-image-section {
  padding: 32px 0 6px;
  display: flex;
  justify-content: center;
  animation: naseeha-demo-cardReveal 0.8s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.naseeha-demo-image-frame {
  position: relative;
  width: 90%;
  overflow: hidden;
  border-radius: 16px;
}

/* Gold corner ornaments */
.naseeha-demo-image-frame::before,
.naseeha-demo-image-frame::after {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border: 3px solid var(--nd-gold);
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  animation: naseeha-demo-cornerFade 0.6s 2s ease-out forwards;
}
.naseeha-demo-image-frame::before {
  top: 10px; right: 10px;
  border-left: none; border-bottom: none;
  border-radius: 0 8px 0 0;
}
.naseeha-demo-image-frame::after {
  bottom: 10px; left: 10px;
  border-right: none; border-top: none;
  border-radius: 0 0 0 8px;
}
@keyframes naseeha-demo-cornerFade {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 0.55; transform: scale(1); }
}

.naseeha-demo-image-inner {
  position: relative;
  width: 100%;
  overflow: hidden;
  border-radius: 16px;
}
.naseeha-demo-image-inner::before,
.naseeha-demo-image-inner::after {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border: 3px solid var(--nd-gold);
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  animation: naseeha-demo-cornerFade 0.6s 2.15s ease-out forwards;
}
.naseeha-demo-image-inner::before {
  top: 10px; left: 10px;
  border-right: none; border-bottom: none;
  border-radius: 8px 0 0 0;
}
.naseeha-demo-image-inner::after {
  bottom: 10px; right: 10px;
  border-left: none; border-top: none;
  border-radius: 0 0 8px 0;
}

/* Curtain reveal */
.naseeha-demo-curtain-left,
.naseeha-demo-curtain-right {
  position: absolute;
  top: 0; bottom: 0;
  width: 50%;
  z-index: 4;
  pointer-events: none;
}
.naseeha-demo-curtain-left {
  left: 0;
  background: linear-gradient(90deg, var(--nd-earth-deep) 40%, var(--nd-earth-dark));
  animation: naseeha-demo-curtainSlideLeft 1.2s 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
.naseeha-demo-curtain-right {
  right: 0;
  background: linear-gradient(-90deg, var(--nd-earth-deep) 40%, var(--nd-earth-dark));
  animation: naseeha-demo-curtainSlideRight 1.2s 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
@keyframes naseeha-demo-curtainSlideLeft  { to { transform: translateX(-105%); } }
@keyframes naseeha-demo-curtainSlideRight { to { transform: translateX(105%); } }

.naseeha-demo-curtain-seam {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%; width: 3px;
  margin-left: -1.5px;
  background: linear-gradient(to bottom, transparent, var(--nd-gold-light) 30%, var(--nd-gold) 50%, var(--nd-gold-light) 70%, transparent);
  z-index: 5;
  pointer-events: none;
  animation: naseeha-demo-seamFade 0.5s 1s ease-out forwards;
}
@keyframes naseeha-demo-seamFade { to { opacity: 0; } }

.naseeha-demo-image-shimmer {
  position: absolute;
  top: 0; left: -100%; bottom: 0;
  width: 60%;
  z-index: 3;
  pointer-events: none;
  background: linear-gradient(
    105deg,
    transparent 20%,
    rgba(221,192,110,0.20) 40%,
    rgba(221,192,110,0.35) 50%,
    rgba(221,192,110,0.20) 60%,
    transparent 80%
  );
  animation: naseeha-demo-shimmerSweep 1.5s 2.2s ease-in-out forwards;
}
@keyframes naseeha-demo-shimmerSweep {
  0%   { left: -60%; }
  100% { left: 160%; }
}

.naseeha-demo-wide-img {
  width: 100%;
  display: block;
  object-fit: cover;
  border-radius: 16px;
  opacity: 0;
  animation: naseeha-demo-imgScaleIn 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes naseeha-demo-imgScaleIn {
  0%   { opacity: 0; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}

/* Gold glow border */
.naseeha-demo-image-glow {
  position: absolute;

<script>
(function() {
  var el = document.getElementById('naseeha-demo-counter');
  if (!el) return;
  var counted = false;

  function animate() {
    if (counted) return;
    counted = true;
    var target = 100, dur = 2200, start = performance.now();
    function tick(now) {
      var t = Math.min((now - start) / dur, 1);
      var ease = 1 - Math.pow(2, -10 * t);
      el.textContent = Math.floor(ease * target);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = target;
    }
    requestAnimationFrame(tick);
  }

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { setTimeout(animate, 500); obs.disconnect(); }
    });
  }, { threshold: 0.3 });
  obs.observe(el);
})();
</script>
