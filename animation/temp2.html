<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تهنئة عيد الفطر المبارك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020b1a; }

    .scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-o, 0.1); }
      50%       { opacity: var(--max-o, 0.9); }
    }
    .star       { animation: twinkle var(--dur,4s) var(--delay,0s) ease-in-out infinite; }
    .star-cross { animation: twinkle var(--dur,4s) var(--delay,0s) ease-in-out infinite; }

    @keyframes shoot {
      0%   { opacity: 0; transform: translate(0,0); }
      5%   { opacity: 1; }
      40%  { opacity: 0.8; }
      70%  { opacity: 0; transform: translate(var(--dx,-200px), var(--dy,110px)); }
      100% { opacity: 0; transform: translate(var(--dx,-200px), var(--dy,110px)); }
    }
    .shooting-star { opacity: 0; animation: shoot var(--shoot-dur,8s) var(--shoot-delay,0s) ease-in infinite; }

    @keyframes driftCloud {
      from { transform: translateX(0); }
      to   { transform: translateX(-1700px); }
    }
    .cloud { animation: driftCloud var(--cloud-speed,120s) linear infinite; }

    @keyframes flagSway {
      0%,100% { transform: skewX(0deg) scaleY(1); }
      50%     { transform: skewX(5deg) scaleY(0.95); }
    }
    .bunting-flag { transform-origin: top center; animation: flagSway 2.8s var(--fd,0s) ease-in-out infinite; }

    @keyframes bulbPulse {
      0%,100% { opacity: 0.55; filter: brightness(1); }
      50%     { opacity: 1;    filter: brightness(1.8) drop-shadow(0 0 7px currentColor); }
    }
    .string-bulb { animation: bulbPulse 2.2s var(--bd,0s) ease-in-out infinite; }
    .dome-light  { animation: bulbPulse 3s   var(--dd,0s) ease-in-out infinite; }

    @keyframes cannonFlash {
      0%,100% { opacity: 0; transform: scale(0.5); }
      5%      { opacity: 1; transform: scale(1.15); }
      35%     { opacity: 0.7; transform: scale(1.4); }
      65%     { opacity: 0; transform: scale(1.6); }
    }
    @keyframes smokeDrift {
      0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
      10%  { opacity: 0.4; }
      100% { opacity: 0; transform: translate(-60px,-100px) scale(3); }
    }
    .cannon-flash { animation: cannonFlash 5s 0.5s ease-out infinite; }
    .smoke        { fill: rgba(180,200,230,0.16); animation: smokeDrift 5s 0.7s ease-out infinite; }
    .smoke-2      { animation: smokeDrift 5s 1.1s ease-out infinite; }
    .smoke-3      { animation: smokeDrift 5s 0.9s ease-out infinite; }

    /* Fireworks */
    @keyframes fwBurst {
      0%   { opacity: 0; transform: scale(0); }
      12%  { opacity: 1; transform: scale(1); }
      55%  { opacity: 0.65; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.7); }
    }
    .fw-burst {
      transform-origin: var(--cx,800px) var(--cy,200px);
      animation: fwBurst var(--fw-dur,4s) var(--fw-delay,0s) ease-out infinite;
    }

    /* Moon pulse */
    @keyframes moonGlow {
      0%,100% { opacity: 0.45; }
      50%     { opacity: 0.8; }
    }
    .moon-halo-outer { animation: moonGlow 4s ease-in-out infinite; }
    .moon-halo-inner { animation: moonGlow 3.2s 1s ease-in-out infinite; }

    /* Confetti */
    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(940px) rotate(800deg); opacity: 0.2; }
    }
    .confetti { animation: confettiFall var(--cf-dur,8s) var(--cf-delay,0s) linear infinite; }

    /* Message card */
    .message-card {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(560px, 92vw);
      background: linear-gradient(160deg, rgba(10,20,45,0.9) 0%, rgba(5,12,28,0.95) 100%);
      border: 1px solid rgba(232,183,48,0.32);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 70px rgba(232,183,48,0.1), 0 0 140px rgba(232,183,48,0.05), inset 0 0 50px rgba(232,183,48,0.05);
      backdrop-filter: blur(14px);
      z-index: 100;
      animation: cardEntrance 1.3s 0.3s both cubic-bezier(.16,1,.3,1);
    }
    @keyframes cardEntrance {
      from { opacity:0; transform: translate(-50%,-47%) scale(0.92); }
      to   { opacity:1; transform: translate(-50%,-50%) scale(1); }
    }
    .card-ornament { width: 100%; display: block; }
    .card-content  { padding: 18px 30px 22px; text-align: center; direction: rtl; }

    .card-title-wrap { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
    .card-title {
      font-family: 'Amiri', serif;
      font-size: clamp(1.75rem, 4.5vw, 2.5rem);
      font-weight: 700;
      color: #f5d87a;
      text-shadow: 0 0 32px rgba(245,216,122,0.45), 0 2px 8px rgba(0,0,0,0.6);
      line-height: 1.2;
    }
    .title-sparkle { font-size: 1rem; color: rgba(245,216,122,0.65); }

    .card-divider { display:flex; align-items:center; gap:10px; margin: 10px 0 14px; }
    .divider-line { flex:1; height:1px; background: linear-gradient(90deg,transparent,rgba(232,183,48,0.4),transparent); }
    .divider-star { color: rgba(232,183,48,0.6); font-size: 1rem; }

    .card-line {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.92rem, 2.2vw, 1.08rem);
      color: rgba(220,235,255,0.82);
      line-height: 1.8;
      margin-bottom: 3px;
    }
    .card-line.highlight {
      color: #f0c84a;
      font-size: clamp(1rem, 2.4vw, 1.18rem);
      font-weight: 700;
      text-shadow: 0 0 18px rgba(240,200,74,0.4);
    }
    .card-footer {
      margin-top: 14px;
      font-family: 'Amiri', serif;
      font-size: 1.05rem;
      color: rgba(232,183,48,0.7);
      display: flex; align-items:center; justify-content:center; gap:12px;
    }

    .scene-fade {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 42%, rgba(2,8,18,0.38) 100%);
      z-index: 50;
    }
  </style>
</head>
<body>

<svg id="bg-svg" class="scene" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010812"/>
      <stop offset="50%"  stop-color="#071430"/>
      <stop offset="100%" stop-color="#0a1a2c"/>
    </linearGradient>
    <radialGradient id="skyGlow" cx="50%" cy="18%" r="42%">
      <stop offset="0%"   stop-color="#2a4a80" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="72%" r="52%">
      <stop offset="0%"   stop-color="#1e3560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1e38"/>
      <stop offset="100%" stop-color="#050c1a"/>
    </linearGradient>

    <!-- Full moon -->
    <radialGradient id="fullMoonFace" cx="45%" cy="38%" r="52%">
      <stop offset="0%"   stop-color="#fffaee"/>
      <stop offset="55%"  stop-color="#ffe9a5"/>
      <stop offset="100%" stop-color="#f0c84a"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe8a3" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#e8b730" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonHaloInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5d0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="craterShade" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c9962a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9962a" stop-opacity="0"/>
    </radialGradient>

    <!-- Firework gradients -->
    <radialGradient id="fw1Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff700" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#ff8c00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fw2Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#eafbff" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#00cfff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0050ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fw3Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff0fa" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#ff44cc" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#cc00aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fw4Grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#efffea" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#44ff88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00aa44" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5d87a" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#e8b730" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="flashGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff3d0" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#f7c963" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f7c963" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shootGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.2"/></filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bulbGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fwGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fwBigGlow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="moonGlowFilter">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#skyGrad)"/>
  <rect width="1600" height="900" fill="url(#skyGlow)"/>
  <rect width="1600" height="900" fill="url(#horizonGlow)"/>

  <!-- Stars far -->
  <g opacity="0.65">
    <circle cx="50"   cy="48"  r="0.8" fill="#c8d6f0" class="star" style="--dur:4.2s;--delay:0.3s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="142"  cy="76"  r="0.6" fill="#e0eaff" class="star" style="--dur:5.1s;--delay:1.2s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="230"  cy="32"  r="0.7" fill="#dde8ff" class="star" style="--dur:3.8s;--delay:2.1s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="380"  cy="55"  r="0.9" fill="#c8d6f0" class="star" style="--dur:4.5s;--delay:0.8s;--min-o:0.08;--max-o:0.5"/>
    <circle cx="490"  cy="38"  r="0.6" fill="#e0eaff" class="star" style="--dur:3.5s;--delay:1.5s;--min-o:0.1;--max-o:0.4"/>
    <circle cx="620"  cy="62"  r="0.8" fill="#dde8ff" class="star" style="--dur:4.8s;--delay:0.4s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="780"  cy="44"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.3s;--delay:2.5s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="880"  cy="72"  r="0.6" fill="#e0eaff" class="star" style="--dur:3.9s;--delay:1.8s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="990"  cy="28"  r="0.9" fill="#dde8ff" class="star" style="--dur:4.1s;--delay:0.6s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="1150" cy="58"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.5s;--delay:1.1s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="1320" cy="35"  r="0.8" fill="#e0eaff" class="star" style="--dur:3.6s;--delay:2.3s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="1480" cy="68"  r="0.6" fill="#dde8ff" class="star" style="--dur:4.4s;--delay:0.9s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="1550" cy="42"  r="0.7" fill="#c8d6f0" class="star" style="--dur:5.2s;--delay:1.6s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="105"  cy="155" r="0.6" fill="#e0eaff" class="star" style="--dur:4.6s;--delay:2.7s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="310"  cy="178" r="0.8" fill="#dde8ff" class="star" style="--dur:3.7s;--delay:0.2s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="560"  cy="195" r="0.7" fill="#c8d6f0" class="star" style="--dur:5.0s;--delay:1.4s;--min-o:0.08;--max-o:0.45"/>
    <circle cx="695"  cy="168" r="0.9" fill="#e0eaff" class="star" style="--dur:4.3s;--delay:0.7s;--min-o:0.1;--max-o:0.5"/>
    <circle cx="870"  cy="148" r="0.6" fill="#dde8ff" class="star" style="--dur:3.4s;--delay:2.0s;--min-o:0.08;--max-o:0.4"/>
    <circle cx="1040" cy="188" r="0.8" fill="#c8d6f0" class="star" style="--dur:4.9s;--delay:1.3s;--min-o:0.1;--max-o:0.45"/>
    <circle cx="1240" cy="165" r="0.7" fill="#e0eaff" class="star" style="--dur:5.4s;--delay:0.5s;--min-o:0.08;--max-o:0.5"/>
    <circle cx="1440" cy="182" r="0.6" fill="#dde8ff" class="star" style="--dur:3.3s;--delay:1.9s;--min-o:0.1;--max-o:0.4"/>
  </g>

  <!-- Stars mid -->
  <g>
    <circle cx="180"  cy="118" r="1.8" fill="#e7f0ff" class="star" filter="url(#tinyBlur)" style="--dur:3.2s;--delay:0.2s;--min-o:0.12;--max-o:0.85"/>
    <circle cx="360"  cy="90"  r="1.5" fill="#f6fbff" class="star" style="--dur:3.8s;--delay:1.6s;--min-o:0.1;--max-o:0.8"/>
    <circle cx="520"  cy="155" r="1.9" fill="#ecf3ff" class="star" filter="url(#tinyBlur)" style="--dur:2.8s;--delay:0.5s;--min-o:0.15;--max-o:0.9"/>
    <circle cx="740"  cy="108" r="2.2" fill="#ffffff" class="star" style="--dur:3.5s;--delay:2.2s;--min-o:0.12;--max-o:0.95"/>
    <circle cx="910"  cy="205" r="1.7" fill="#e3edff" class="star" style="--dur:4.0s;--delay:0.9s;--min-o:0.1;--max-o:0.8"/>
    <circle cx="1100" cy="88"  r="2.0" fill="#fbfdff" class="star" filter="url(#tinyBlur)" style="--dur:3.0s;--delay:1.1s;--min-o:0.15;--max-o:0.9"/>
    <circle cx="1430" cy="235" r="1.8" fill="#e6efff" class="star" style="--dur:3.6s;--delay:1.8s;--min-o:0.12;--max-o:0.85"/>
  </g>

  <!-- Stars near -->
  <g filter="url(#starGlow)">
    <g class="star-cross" style="--dur:4.5s;--delay:0.3s;--min-o:0.2;--max-o:1">
      <line x1="258" y1="192" x2="262" y2="208" stroke="#fff" stroke-width="1.2"/>
      <line x1="252" y1="200" x2="268" y2="200" stroke="#fff" stroke-width="1.2"/>
    </g>
    <g class="star-cross" style="--dur:5s;--delay:1.5s;--min-o:0.15;--max-o:0.95">
      <line x1="648" y1="78" x2="652" y2="92" stroke="#e8f0ff" stroke-width="1"/>
      <line x1="643" y1="85" x2="657" y2="85" stroke="#e8f0ff" stroke-width="1"/>
    </g>
    <g class="star-cross" style="--dur:3.8s;--delay:2s;--min-o:0.18;--max-o:1">
      <line x1="1058" y1="172" x2="1062" y2="188" stroke="#fff" stroke-width="1.3"/>
      <line x1="1052" y1="180" x2="1068" y2="180" stroke="#fff" stroke-width="1.3"/>
    </g>
  </g>

  <!-- Shooting stars -->
  <g>
    <line class="shooting-star" x1="480" y1="80" x2="530" y2="80"
      stroke="url(#shootGrad)" stroke-width="2" stroke-linecap="round"
      style="--shoot-dur:7s;--shoot-delay:3s;--dx:-200px;--dy:110px"
      transform="rotate(30 480 80)"/>
    <line class="shooting-star" x1="200" y1="200" x2="245" y2="200"
      stroke="url(#shootGrad)" stroke-width="1.3" stroke-linecap="round"
      style="--shoot-dur:11s;--shoot-delay:8s;--dx:-170px;--dy:95px"
      transform="rotate(32 200 200)"/>
  </g>

  <!-- ══ FIREWORKS — Eid al-Fitr sky ══ -->

  <!-- FW1: left — golden -->
  <g class="fw-burst" style="--cx:290px;--cy:175px;--fw-dur:4.2s;--fw-delay:0s" filter="url(#fwGlow)">
    <circle cx="290" cy="175" r="58" fill="url(#fw1Grad)"/>
    <line x1="290" y1="117" x2="290" y2="97"  stroke="#ffe044" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="290" y1="233" x2="290" y2="253" stroke="#ffe044" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="232" y1="175" x2="212" y2="175" stroke="#ffe044" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="348" y1="175" x2="368" y2="175" stroke="#ffe044" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="249" y1="134" x2="235" y2="120" stroke="#ffaa22" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="331" y1="216" x2="345" y2="230" stroke="#ffaa22" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="331" y1="134" x2="345" y2="120" stroke="#ffaa22" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="249" y1="216" x2="235" y2="230" stroke="#ffaa22" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="270" y1="112" x2="263" y2="96"  stroke="#ffe088" stroke-width="1.5" opacity="0.7"/>
    <line x1="310" y1="112" x2="317" y2="96"  stroke="#ffe088" stroke-width="1.5" opacity="0.7"/>
    <circle cx="270" cy="157" r="3.5" fill="#fff700" opacity="0.9"/>
    <circle cx="310" cy="193" r="3"   fill="#fff700" opacity="0.85"/>
    <circle cx="305" cy="153" r="2.5" fill="#ffe088" opacity="0.75"/>
    <circle cx="275" cy="196" r="2.5" fill="#ffe088" opacity="0.75"/>
  </g>

  <!-- FW2: upper center — large golden burst -->
  <g class="fw-burst" style="--cx:800px;--cy:110px;--fw-dur:4.8s;--fw-delay:0.8s" filter="url(#fwBigGlow)">
    <circle cx="800" cy="110" r="75" fill="url(#fw1Grad)"/>
    <line x1="800" y1="35"  x2="800" y2="10"  stroke="#ffe044" stroke-width="3.2" stroke-linecap="round" opacity="0.9"/>
